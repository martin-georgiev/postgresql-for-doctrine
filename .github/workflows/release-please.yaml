name: Release Please

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - '!.github/workflows/release-please.yaml'

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    name: Create new release PR
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/actions/release-please/config.json
          manifest-file: .github/actions/release-please/manifest.json

  purge-camo-cache:
    runs-on: ubuntu-latest
    name: Purge Camo's cache for README images
    permissions: {}
    steps:
      - uses: kevincobain2000/action-camo-purge@0b70f4d64c9828aace7bbbf1931a646957734ef3 # v1
